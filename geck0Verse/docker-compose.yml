name: geck0verse
x-common: &common
  build: .
  restart: unless-stopped
  env_file: .env
  volumes:
    - ./data:/data
    - ./config:/app/config:ro
    - ./domains:/app/domains:ro
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  hub:
    <<: *common
    command: ["uvicorn", "services.hub.app:app", "--host", "0.0.0.0", "--port", "8080"]
    ports: ["8080:8080"]

  travelsheep:
    <<: *common
    command: ["uvicorn", "services.travelsheep.app:app", "--host", "0.0.0.0", "--port", "8101"]
    ports: ["8101:8101"]

  sealife:
    <<: *common
    command: ["uvicorn", "services.sealife.app:app", "--host", "0.0.0.0", "--port", "8102"]
    ports: ["8102:8102"]

  geck0earth:
    <<: *common
    command: ["uvicorn", "services.geck0earth.app:app", "--host", "0.0.0.0", "--port", "8103"]
    ports: ["8103:8103"]

  greengeck0:
    <<: *common
    command: ["uvicorn", "services.greengeck0.app:app", "--host", "0.0.0.0", "--port", "8104"]
    ports: ["8104:8104"]
    volumes:
      - ./data:/data
      - ${GECK0_PROJECTS_ROOT}:/workspace/geck0Projects
      - ./config:/app/config:ro
      - ./domains:/app/domains:ro

  breadcrumbs:
    <<: *common
    command: ["uvicorn", "services.breadcrumbs.app:app", "--host", "0.0.0.0", "--port", "8105"]
    ports: ["8105:8105"]
    volumes:
      - ./data:/data
      - ${GECK0_PROJECTS_ROOT}:/workspace/geck0Projects
      - ./config:/app/config:ro
      - ./domains:/app/domains:ro

  purplegeck0:
    <<: *common
    command: ["uvicorn", "services.purplegeck0.app:app", "--host", "0.0.0.0", "--port", "8106"]
    ports: ["8106:8106"]

  bluegeck0:
    <<: *common
    command: ["uvicorn", "services.bluegeck0.app:app", "--host", "0.0.0.0", "--port", "8107"]
    ports: ["8107:8107"]

  yellowgeck0:
    <<: *common
    command: ["uvicorn", "services.yellowgeck0.app:app", "--host", "0.0.0.0", "--port", "8108"]
    ports: ["8108:8108"]

  pinkgeck0:
    <<: *common
    command: ["uvicorn", "services.pinkgeck0.app:app", "--host", "0.0.0.0", "--port", "8109"]
    ports: ["8109:8109"]

  scheduler:
    <<: *common
    command: ["uvicorn", "services.scheduler.app:app", "--host", "0.0.0.0", "--port", "8110"]
    ports: ["8110:8110"]
    depends_on:
      travelsheep:
        condition: service_started
      sealife:
        condition: service_started

  dashboard:
    image: nginx:1.29-alpine
    restart: unless-stopped
    ports: ["8188:80"]
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [hub, travelsheep, sealife, geck0earth]

volumes:
  postgres_data:
