<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Geck0verse Control Plane</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"></head><body>
<header><h1>🦎 Geck0verse Control Plane</h1><div class="muted">JE control plane • Crumble-ready • local/Tailscale first</div></header>
<div class="wrap grid">
<section class="card wide"><h2>Crumble</h2><div class="controls"><input id="token" type="password" placeholder="X-Geck0-Token"><input id="message" style="flex:1" placeholder="Ask for deals, listings, Earth layers or project status"><button onclick="chat()">Send</button></div><pre id="chatOut"></pre></section>
<section class="card"><h2>TravelSheep</h2><div class="controls"><button onclick="loadTravel()">Latest ≤ £200</button><button onclick="refresh('travel')">Refresh</button></div><div id="travel" class="list"></div></section>
<section class="card"><h2>SeaLife</h2><div class="controls"><button onclick="loadSea()">Latest homes</button><button onclick="refresh('sea')">Refresh</button></div><div id="sea" class="list"></div></section>
<section class="card"><h2>Domain Apps</h2><div id="domains" class="list"></div></section>
<section class="card"><h2>Green Geck0</h2><input id="testUrl" placeholder="https://example.com"><button onclick="safeTest()">Run safe checks</button><pre id="greenOut"></pre></section>
<section class="card wide"><h2>Geck0Earth</h2><div class="controls"><label><input type="checkbox" value="weather" checked class="layer"> Weather</label><label><input type="checkbox" value="air_quality" checked class="layer"> Air quality</label><label><input type="checkbox" value="marine" class="layer"> Marine</label><label><input type="checkbox" value="earthquakes" class="layer"> Earthquakes</label><label><input type="checkbox" value="travel" checked class="layer"> Travel deals</label><label><input type="checkbox" value="property" checked class="layer"> Property</label><button onclick="loadEarth()">Update layers</button></div><div id="map"></div><pre id="earthOut"></pre></section>
</div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="app.js"></script></body></html>
