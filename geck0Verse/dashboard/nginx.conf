server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 25m;
  location /api/hub/ { proxy_pass http://hub:8080/; proxy_set_header Host $host; }
  location /api/travel/ { proxy_pass http://travelsheep:8101/; proxy_set_header Host $host; }
  location /api/sea/ { proxy_pass http://sealife:8102/; proxy_set_header Host $host; }
  location /api/earth/ { proxy_pass http://geck0earth:8103/; proxy_set_header Host $host; }
  location /api/green/ { proxy_pass http://greengeck0:8104/; proxy_set_header Host $host; }
  location / { try_files $uri $uri/ /index.html; }
}
