<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Geck0 Earth v2.3</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<style>
html,body{height:100%;margin:0;background:#001008;color:#00ff88;font-family:monospace}
#top{padding:12px;font-size:30px;font-weight:bold}
#controls{padding:10px;border-top:1px solid #00ff88;border-bottom:1px solid #00ff88}
button{background:#001008;color:#00ff88;border:1px solid #00ff88;padding:10px;margin:4px}
#map{height:calc(100vh - 120px);width:100%}
</style>
</head>
<body>
<div id="top">🦎 Geck0 Earth v2.3 LIVE MAP</div>
<div id="controls">
<button onclick="toggleLayer('travel')">Toggle TravelSheep</button>
<button onclick="toggleLayer('sealife')">Toggle SeaLife</button>
<button onclick="toggleLayer('tfl')">Toggle TfL</button>
<button onclick="toggleLayer('wardrive')">Toggle Wardrive</button>
<button onclick="toggleLayer('ketama')">Toggle Ketama</button>
</div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([51.5072,-0.1276],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom:19, attribution:'© OpenStreetMap'
}).addTo(map);

const layers={
 travel:L.layerGroup([L.marker([51.5072,-0.1276]).bindPopup('TravelSheep London'),L.marker([50.8225,-0.1372]).bindPopup('Brighton route')]),
 sealife:L.layerGroup([L.marker([50.8198,-0.1360]).bindPopup('SeaLife Brighton'),L.marker([51.3890,1.3860]).bindPopup('SeaLife Margate')]),
 tfl:L.layerGroup([L.marker([51.5033,-0.1195]).bindPopup('Waterloo'),L.marker([51.3757,-0.0922]).bindPopup('East Croydon')]),
 wardrive:L.layerGroup([L.circle([51.379,-0.074],{radius:600}).bindPopup('Wardrive sample zone')]),
 ketama:L.layerGroup([L.marker([51.545,-0.075]).bindPopup('Ketama Dalston'),L.marker([51.379,-0.074]).bindPopup('Ketama home zone')])
};
Object.values(layers).forEach(l=>l.addTo(map));
function toggleLayer(k){map.hasLayer(layers[k])?map.removeLayer(layers[k]):layers[k].addTo(map);}
</script>
</body>
</html>
