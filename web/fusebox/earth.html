<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Geck0Earth</title><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><style>
html,body,#map{height:100%;margin:0;background:#001007;color:#00ff66;font-family:monospace}.panel{position:absolute;z-index:999;background:rgba(0,18,9,.92);border:1px solid #00ff66;border-radius:8px;padding:8px;box-shadow:0 0 10px #00ff6655}#top{top:8px;left:8px;right:8px}#layers{top:70px;left:8px;max-width:92%;display:flex;flex-wrap:wrap}#side{top:145px;right:8px;max-width:280px;max-height:45%;overflow:auto}#cmd{bottom:8px;left:8px;right:8px}button,input{background:#001007;color:#00ff66;border:1px solid #00ff66;border-radius:5px;padding:7px;margin:3px;font-family:monospace}.leaflet-control-attribution{background:#001007!important;color:#00ff66!important}@media(max-width:700px){#side{display:none}#layers{top:58px}.panel{font-size:12px}button{padding:6px}}</style></head><body><div id="map"></div><div id="top" class="panel">🌍 <b>Geck0Earth v5.1</b> | OSM + public/private layers + TfL proxy + Crumble command bar</div><div id="layers" class="panel"><button onclick="toggle('travelsheep')">TravelSheep</button><button onclick="toggle('sealife')">SeaLife</button><button onclick="toggle('tfl')">TfL Status</button><button onclick="toggle('wigle')">WiGLE</button><button onclick="toggle('ketama')">Ketama</button><button onclick="toggle('weather')">Weather</button><button onclick="toggle('recon')">Recon</button></div><div id="side" class="panel"><b>Status</b><pre id="status">Loading...</pre></div><div id="cmd" class="panel"><input id="q" style="width:72%" placeholder="Ask Crumble: show tfl, toggle wigle, find dog friendly cottage..."><button onclick="runCmd()">Run</button></div><script>
const map=L.map('map').setView([51.5074,-0.1278],11);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);const layers={};
function mk(){return L.layerGroup()}['travelsheep','sealife','tfl','wigle','ketama','weather','recon'].forEach(n=>layers[n]=mk());
layers.sealife.addLayer(L.circle([50.8225,-0.1372],{radius:1500}).bindPopup('SeaLife: Brighton'));layers.sealife.addLayer(L.circle([50.8552,0.5729],{radius:1500}).bindPopup('SeaLife: Hastings'));layers.sealife.addLayer(L.circle([51.3896,1.3868],{radius:1500}).bindPopup('SeaLife: Margate'));
layers.ketama.addLayer(L.polyline([[51.374,-0.09],[51.37,-0.1],[51.365,-0.11]],{weight:4}).bindPopup('Ketama walk sample'));
layers.weather.addLayer(L.circle([51.5074,-0.1278],{radius:5000}).bindPopup('Weather/API layer placeholder'));
layers.recon.addLayer(L.marker([51.3721,-0.0982]).bindPopup('Recon / device observation placeholder'));
async function loadGeo(name){try{let r=await fetch('/api/layer/'+name);let j=await r.json();L.geoJSON(j,{onEachFeature:(f,l)=>l.bindPopup((f.properties&&(f.properties.name||f.properties.ssid||f.properties.title))||name)}).addTo(layers[name]);}catch(e){console.log(e)}}loadGeo('travelsheep');loadGeo('wigle');
async function loadTfl(){let s=document.getElementById('status');try{let r=await fetch('/api/tfl/lines');let j=await r.json();if(j.error){s.textContent='TfL: '+j.error;return} s.textContent='TfL lines loaded: '+j.length+'\n'+j.slice(0,10).map(x=>x.name+': '+(x.lineStatuses?.[0]?.statusSeverityDescription||'unknown')).join('\n'); j.slice(0,15).forEach((x,i)=>layers.tfl.addLayer(L.marker([51.50+(i%5)*.01,-0.16+Math.floor(i/5)*.03]).bindPopup(x.name+': '+(x.lineStatuses?.[0]?.statusSeverityDescription||''))));}catch(e){s.textContent='TfL error: '+e}}loadTfl();
function toggle(name){if(map.hasLayer(layers[name]))map.removeLayer(layers[name]);else layers[name].addTo(map)}layers.travelsheep.addTo(map);layers.sealife.addTo(map);layers.tfl.addTo(map);
fetch('/api/status').then(r=>r.json()).then(j=>{document.getElementById('status').textContent+='\n\nFusebox: '+j.status+' '+j.version})
function runCmd(){let q=document.getElementById('q').value.toLowerCase();['travelsheep','sealife','tfl','wigle','ketama','weather','recon'].forEach(n=>{if(q.includes(n))toggle(n)}); if(!q) alert('Type a command for Crumble scaffold');}
</script></body></html>
